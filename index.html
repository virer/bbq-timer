<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 BBQ Timer Pro</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2a2a35;
            --accent: #ff5722;
            --text: #ffffff;
            --muted: #9e9e9e;
            --ready: #ffc107;
            --done: #4caf50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: var(--accent); margin-bottom: 20px; }
        .global-controls {
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }
        .global-controls .session-info {
            flex: 1;
            min-width: 200px;
        }
        .global-controls .session-info p {
            margin: 0 0 8px;
            font-size: 0.9rem;
            color: var(--muted);
        }
        .global-controls .session-info p strong {
            color: var(--text);
        }
        .btn-global {
            padding: 12px 24px;
            font-size: 1.1rem;
            min-width: 140px;
        }
        .btn-global.paused { background: #4caf50; }
        .progress-track {
            height: 10px;
            background: #444;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 4px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ff9800);
            border-radius: 5px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .progress-fill.done { background: var(--done); }
        .form-container {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
            display: flex;
            gap: 10px;
        }
        input, button {
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
        }
        input[type="text"] { flex: 2; }
        input[type="number"] { flex: 1; }
        button {
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .timers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }
        .timer-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid var(--accent);
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .timer-card.waiting { border-left-color: #607d8b; }
        .timer-card.ready {
            border-left-color: var(--ready);
            box-shadow: 0 0 12px rgba(255, 193, 7, 0.4);
        }
        .timer-card.cooking { border-left-color: var(--accent); }
        .timer-card.finished {
            border-left-color: var(--done);
            animation: blink 1s infinite;
        }
        .timer-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 6px; }
        .timer-status {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 8px;
            min-height: 1.2em;
        }
        .timer-status.ready-text { color: var(--ready); font-weight: bold; }
        .timer-status.cooking-text { color: var(--accent); }
        .timer-display { font-size: 2rem; font-weight: bold; font-family: monospace; margin-bottom: 10px; }
        .timer-display.idle { font-size: 1.2rem; color: var(--muted); }
        .card-progress { margin-bottom: 12px; }
        .card-progress .progress-track { height: 6px; }
        .controls { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; background: #444; }
        .btn-start { background: #4caf50; }
        .btn-delete { background: #d32f2f; margin-left: auto; }
        @keyframes blink {
            50% { background-color: #1a3a1a; }
        }
    </style>
</head>
<body>

    <h1>🔥 BBQ Timer</h1>

    <div class="global-controls" id="globalControls">
        <button class="btn-global paused" id="globalPlayPause" onclick="toggleGlobal()">▶ Démarrer</button>
        <div class="session-info">
            <p id="sessionLabel">Session en pause — ajoutez vos aliments puis lancez la session.</p>
            <div class="progress-track">
                <div class="progress-fill" id="globalProgress"></div>
            </div>
        </div>
    </div>

    <div class="form-container">
        <input type="text" id="foodName" placeholder="Ex: Merguez, Patate...">
        <input type="number" id="foodMinutes" placeholder="Min" min="1">
        <button onclick="addTimer()">Ajouter</button>
    </div>

    <div class="timers-grid" id="timersGrid"></div>

    <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

    <script>
        let timers = [];
        let timerInterval;
        let session = {
            running: false,
            elapsed: 0,
            started: false
        };

        const defaultFoods = [
            { name: "Patate douce", minutes: 40 },
            { name: "Patate pre-cuite", minutes: 30 },
            { name: "Chipolata", minutes: 11 },
            { name: "Merguez", minutes: 8 },
            { name: "Halloumi", minutes: 3 },
        ];

        window.onload = () => {
            defaultFoods.forEach(f => createTimerData(f.name, f.minutes));
            startTicker();
            updateGlobalUI();
        };

        function getMaxDuration() {
            if (timers.length === 0) return 0;
            return Math.max(...timers.map(t => t.totalSeconds));
        }

        function recalculateSchedule() {
            const maxDuration = getMaxDuration();
            timers.forEach(t => {
                t.placeAt = maxDuration - t.totalSeconds;
            });
        }

        function startTicker() {
            if (!timerInterval) {
                timerInterval = setInterval(() => {
                    if (session.running) {
                        session.elapsed++;
                    }
                    timers.forEach(timer => {
                        if (timer.running && timer.timeLeft > 0) {
                            timer.timeLeft--;
                            if (timer.timeLeft === 0) {
                                timer.running = false;
                                playAlarm();
                            }
                        }
                    });
                    renderTimers();
                    updateGlobalUI();
                }, 1000);
            }
        }

        function createTimerData(name, minutes) {
            const id = Date.now() + Math.random().toString(36).substr(2, 5);
            timers.push({
                id,
                name,
                totalSeconds: minutes * 60,
                timeLeft: minutes * 60,
                running: false,
                started: false
            });
            recalculateSchedule();
            renderTimers();
            updateGlobalUI();
        }

        function addTimer() {
            const nameInput = document.getElementById('foodName');
            const minInput = document.getElementById('foodMinutes');

            if (nameInput.value.trim() === "" || !minInput.value) return;

            createTimerData(nameInput.value, parseInt(minInput.value));
            nameInput.value = "";
            minInput.value = "";
        }

        function toggleGlobal() {
            if (timers.length === 0) return;
            session.running = !session.running;
            if (session.running) session.started = true;
            renderTimers();
            updateGlobalUI();
        }

        function updateGlobalUI() {
            const btn = document.getElementById('globalPlayPause');
            const label = document.getElementById('sessionLabel');
            const bar = document.getElementById('globalProgress');
            const maxDuration = getMaxDuration();

            if (session.running) {
                btn.textContent = '⏸ Pause';
                btn.classList.remove('paused');
            } else {
                btn.textContent = session.started ? '▶ Reprendre' : '▶ Démarrer';
                btn.classList.add('paused');
            }

            if (timers.length === 0) {
                label.innerHTML = 'Aucun aliment — ajoutez-en pour planifier la cuisson.';
                bar.style.width = '0%';
                return;
            }

            const remaining = Math.max(0, maxDuration - session.elapsed);
            const pct = maxDuration > 0 ? Math.min(100, (session.elapsed / maxDuration) * 100) : 0;
            bar.style.width = pct + '%';
            bar.classList.toggle('done', session.elapsed >= maxDuration && maxDuration > 0);

            if (!session.started) {
                label.innerHTML = `Fin synchronisée dans <strong>${formatTime(maxDuration)}</strong> — lancez la session pour le planning.`;
            } else if (session.running) {
                label.innerHTML = `Session en cours — fin dans <strong>${formatTime(remaining)}</strong>`;
            } else {
                label.innerHTML = `Session en pause — fin dans <strong>${formatTime(remaining)}</strong>`;
            }
        }

        function getTimerPhase(timer) {
            if (timer.timeLeft === 0 && timer.started) return 'finished';
            if (timer.running) return 'cooking';
            if (timer.started) return 'cooking';
            if (!session.started) return 'waiting';
            if (session.elapsed >= timer.placeAt) return 'ready';
            return 'waiting';
        }

        function getPlaceCountdown(timer) {
            return Math.max(0, timer.placeAt - session.elapsed);
        }

        function getStatusText(timer) {
            const phase = getTimerPhase(timer);
            if (phase === 'finished') return '✅ Cuit !';
            if (phase === 'cooking') return '🔥 En cuisson';
            if (!session.started) {
                const delay = timer.placeAt;
                if (delay === 0) return '📍 À placer en premier';
                return `📍 À placer à +${formatTime(delay)} de session`;
            }
            if (phase === 'ready') return '⚡ À placer sur le BBQ maintenant !';
            return `⏳ Place dans ${formatTime(getPlaceCountdown(timer))}`;
        }

        function getProgressPercent(timer) {
            if (!timer.started) return 0;
            const elapsed = timer.totalSeconds - timer.timeLeft;
            return Math.min(100, (elapsed / timer.totalSeconds) * 100);
        }

        function startCooking(id) {
            const timer = timers.find(t => t.id === id);
            if (!timer || timer.started) return;
            timer.started = true;
            timer.running = true;
            renderTimers();
        }

        function adjustTime(id, changeInMinutes) {
            const timer = timers.find(t => t.id === id);
            if (timer) {
                const wasFinished = timer.timeLeft === 0;
                timer.timeLeft = Math.max(0, timer.timeLeft + (changeInMinutes * 60));
                timer.totalSeconds = Math.max(timer.totalSeconds, timer.timeLeft);
                if (timer.timeLeft > 0 && wasFinished) {
                    timer.started = timer.running;
                }
                recalculateSchedule();
            }
            renderTimers();
            updateGlobalUI();
        }

        function toggleTimer(id) {
            const timer = timers.find(t => t.id === id);
            if (!timer || !timer.started) return;
            timer.running = !timer.running;
            renderTimers();
        }

        function deleteTimer(id) {
            timers = timers.filter(t => t.id !== id);
            const card = document.getElementById(`card-${id}`);
            if (card) card.remove();
            recalculateSchedule();
            renderTimers();
            updateGlobalUI();
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function playAlarm() {
            const alarm = document.getElementById('alarmSound');
            alarm.play().catch(() => {});
        }

        function renderTimers() {
            const grid = document.getElementById('timersGrid');

            timers.forEach(timer => {
                let card = document.getElementById(`card-${timer.id}`);
                const phase = getTimerPhase(timer);
                const statusText = getStatusText(timer);
                const progress = getProgressPercent(timer);
                const canStart = !timer.started && (phase === 'ready' || !session.started);

                if (!card) {
                    card = document.createElement('div');
                    card.id = `card-${timer.id}`;
                    grid.appendChild(card);
                }

                card.className = `timer-card ${phase}`;

                const displayTime = timer.started
                    ? formatTime(timer.timeLeft)
                    : formatTime(timer.totalSeconds);
                const displayClass = timer.started ? '' : 'idle';

                let controls = '';
                if (!timer.started) {
                    controls += `<button class="btn-sm btn-start" onclick="startCooking('${timer.id}')">▶ Cuire</button>`;
                } else {
                    controls += `<button class="btn-sm" onclick="toggleTimer('${timer.id}')">${timer.running ? 'Pause' : 'Play'}</button>`;
                }
                controls += `
                    <button class="btn-sm" onclick="adjustTime('${timer.id}', 1)">+1m</button>
                    <button class="btn-sm" onclick="adjustTime('${timer.id}', -1)">-1m</button>
                    <button class="btn-sm btn-delete" onclick="deleteTimer('${timer.id}')">🗑️</button>
                `;

                const statusClass = phase === 'ready' ? 'ready-text' : (phase === 'cooking' ? 'cooking-text' : '');

                card.innerHTML = `
                    <div class="timer-name">${timer.name}</div>
                    <div class="timer-status ${statusClass}">${statusText}</div>
                    <div class="timer-display ${displayClass}">${timer.started ? displayTime : 'Durée ' + displayTime}</div>
                    <div class="card-progress">
                        <div class="progress-track">
                            <div class="progress-fill ${phase === 'finished' ? 'done' : ''}" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="controls">${controls}</div>
                `;
            });
        }
    </script>
</body>
</html>
